{% extends 'base.html' %}

{% block title %}Редагувати — HabitFlow{% endblock %}

{% block content %}
<div class="container" style="max-width: 600px;">

    <a href="/habits/{{ habit.id }}/" style="color: var(--text-secondary); text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem;">
        ← Назад
    </a>

    <div class="card">
        <h1 style="font-size: 1.8rem; font-weight: 800; margin-bottom: 0.5rem;" class="gradient-text">
            Редагувати звичку ✏️
        </h1>
        <p style="color: var(--text-secondary); margin-bottom: 2rem;">Зміни деталі своєї звички</p>

        <form method="POST" action="/habits/{{ habit.id }}/edit/">
            {% csrf_token %}

            <div class="form-group">
                <label class="form-label">Назва звички *</label>
                <input type="text" name="title" class="form-input" value="{{ habit.title }}" required>
            </div>

            <div class="form-group">
                <label class="form-label">Опис</label>
                <input type="text" name="description" class="form-input" value="{{ habit.description }}">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label class="form-label">Іконка</label>
                    <input type="text" name="icon" class="form-input" value="{{ habit.icon }}">
                </div>
                <div class="form-group">
                    <label class="form-label">Колір</label>
                    <input type="color" name="color" class="form-input" value="{{ habit.color }}" style="height: 48px; padding: 0.3rem;">
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label class="form-label">Регулярність</label>
                    <select name="frequency" class="form-input">
                        <option value="daily" {% if habit.frequency == 'daily' %}selected{% endif %}>Щодня</option>
                        <option value="weekly" {% if habit.frequency == 'weekly' %}selected{% endif %}>Щотижня</option>
                        <option value="monthly" {% if habit.frequency == 'monthly' %}selected{% endif %}>Щомісяця</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Ціль (днів)</label>
                    <input type="number" name="target_days" class="form-input" value="{{ habit.target_days }}" min="1" max="365">
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">
                Зберегти зміни →
            </button>
        </form>
    </div>
</div>
{% endblock %}
