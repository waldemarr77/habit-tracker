{% extends 'base.html' %}

{% block title %}Реєстрація — HabitFlow{% endblock %}

{% block content %}
<div class="container" style="min-height: 80vh; display: flex; align-items: center; justify-content: center;">
    <div class="card" style="width: 100%; max-width: 420px;">

        <div style="text-align: center; margin-bottom: 2rem;">
            <h1 style="font-size: 2rem; font-weight: 800;" class="gradient-text">Створи акаунт ⚡</h1>
            <p style="color: var(--text-secondary); margin-top: 0.5rem;">Почни будувати кращі звички вже сьогодні</p>
        </div>

        <form method="POST" action="/register/">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Нікнейм</label>
                <input type="text" name="username" class="form-input" placeholder="vasya123" required>
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-input" placeholder="vasya@gmail.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Пароль</label>
                <input type="password" name="password" class="form-input" placeholder="мінімум 8 символів" required>
            </div>
            <div class="form-group">
                <label class="form-label">Підтвердження паролю</label>
                <input type="password" name="password2" class="form-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">
                Зареєструватись →
            </button>
        </form>

        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary);">
            Вже є акаунт? <a href="/login/" style="color: var(--primary); font-weight: 600;">Увійти</a>
        </p>

    </div>
</div>
{% endblock %}
